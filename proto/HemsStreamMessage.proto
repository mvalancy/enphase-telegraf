syntax = "proto3";

import "google/protobuf/timestamp.proto";

message HemsStreamMessage {
  string asset_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  map<string, Value> metrics = 3;
}

message Value {
  oneof kind {
    double number_value = 1;
    string string_value = 2;
    bool bool_value = 3;
  }
}