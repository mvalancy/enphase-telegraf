# Telegraf config for Enphase solar+battery → InfluxDB
#
# Install:
#   sudo cp conf/telegraf-enphase.conf /etc/telegraf/telegraf.d/enphase.conf
#   sudo systemctl restart telegraf
#
# Credentials: set environment variables for Telegraf. Options:
#
#   Option A — systemd environment file (recommended):
#     echo 'ENPHASE_EMAIL=you@example.com' | sudo tee -a /etc/default/telegraf
#     echo 'ENPHASE_PASSWORD=yourpassword' | sudo tee -a /etc/default/telegraf
#     sudo chmod 600 /etc/default/telegraf
#
#   Option B — systemd override:
#     sudo systemctl edit telegraf
#     # Add:
#     # [Service]
#     # Environment="ENPHASE_EMAIL=you@example.com"
#     # Environment="ENPHASE_PASSWORD=yourpassword"
#
#   Option C — .env file in the repo (bin/enphase-telegraf sources it automatically):
#     cp .env.example .env && edit .env
#

[[inputs.execd]]
  command = ["/opt/enphase-telegraf/bin/enphase-telegraf"]
  signal = "none"
  data_format = "influx"
  restart_delay = "30s"

[[outputs.influxdb_v2]]
  urls = ["${INFLUXDB_URL}"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET}"
